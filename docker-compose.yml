version: '3.9'

x-common-env: &common-env
  NODE_ENV: ${NODE_ENV:-production}
  APP_ENV: ${APP_ENV:-production}

services:
  # ── Laravel Application (PHP 8.3 + Nginx) ──────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
      args:
        PHP_VERSION: '8.3'
    container_name: blb-laravel-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - app-storage:/var/www/html/storage
      - app-bootstrap-cache:/var/www/html/bootstrap/cache
    environment:
      <<: *common-env
      APP_NAME: "${APP_NAME:-BLBGenSix}"
      APP_URL: "${APP_URL:-https://localhost}"
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_KEY: "${APP_KEY}"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: "${DB_DATABASE:-blbgensix}"
      DB_USERNAME: "${DB_USERNAME:-blbuser}"
      DB_PASSWORD: "${DB_PASSWORD}"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      MULTI_SCROBBLER_URL: "http://multi-scrobbler:9078"
      MULTI_SCROBBLER_API_KEY: "${MULTI_SCROBBLER_API_KEY}"
      LARAVEL_WEBSOCKET_HOST: "0.0.0.0"
      LARAVEL_WEBSOCKET_PORT: 6001
      HORIZON_BALANCE: "${HORIZON_BALANCE:-simple}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - blb-frontend
      - blb-backend
      - blb-media
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G

  # ── PostgreSQL Database ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: blb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${DB_DATABASE:-blbgensix}"
      POSTGRES_USER: "${DB_USERNAME:-blbuser}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-blbuser} -d ${DB_DATABASE:-blbgensix}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - blb-backend
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # ── Redis Cache & Queue ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: blb-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - blb-backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ── UniScrape Node.js Service ──────────────────────────────────────
  uniscrape:
    build:
      context: ../UniversalScraper
      dockerfile: docker/Dockerfile
    container_name: blb-uniscrape
    restart: unless-stopped
    ports:
      - "${UNISCRAPES_PORT:-9876}:8085"
    volumes:
      - ../UniversalScraper:/app
      - uniscrape-scrapers:/app/scrapers
    environment:
      <<: *common-env
      PORT: 8085
      SCRAPERS_PATH: /app/scrapers
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      STASH_URL: "http://stash:9999"
      LARAVEL_API_URL: "http://app:80/api/v1"
      LARAVEL_API_KEY: "${UNISCRAPES_API_KEY}"
    depends_on:
      redis:
        condition: service_healthy
      stash:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8085/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - blb-backend
      - blb-media
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 768M

  # ── multi-scrobbler Service ────────────────────────────────────────
  multi-scrobbler:
    image: ghcr.io/foxxmd/multi-scrobbler:latest
    container_name: blb-multi-scrobbler
    restart: unless-stopped
    ports:
      - "${MULTI_SCROBBLER_PORT:-9078}:9078"
    volumes:
      - ./config/multi-scrobbler/config.json:/etc/multi-scrobbler/config.json:ro
      - multi-scrobbler-data:/etc/multi-scrobbler/data
    environment:
      TZ: "${TZ:-UTC}"
      MS_CONFIG_PATH: "/etc/multi-scrobbler/config.json"
      MS_LOG_LEVEL: "${MS_LOG_LEVEL:-info}"
      MS_DATA_PATH: "/etc/multi-scrobbler/data"
      SPOTIFY_CLIENT_ID: "${SPOTIFY_CLIENT_ID}"
      SPOTIFY_CLIENT_SECRET: "${SPOTIFY_CLIENT_SECRET}"
      LASTFM_API_KEY: "${LASTFM_API_KEY}"
      LASTFM_API_SECRET: "${LASTFM_API_SECRET}"
      LISTENBRAINZ_API_TOKEN: "${LISTENBRAINZ_API_TOKEN}"
      JELLYFIN_BASE_URL: "${JELLYFIN_BASE_URL:-http://stash:9999}"
      JELLYFIN_USERNAME: "${JELLYFIN_USERNAME}"
      JELLYFIN_PASSWORD: "${JELLYFIN_PASSWORD}"
      PLEX_BASE_URL: "${PLEX_BASE_URL}"
      PLEX_TOKEN: "${PLEX_TOKEN}"
      LARAVEL_WEBHOOK_URL: "${LARAVEL_WEBHOOK_URL:-http://app:80/api/v1/music/webhook}"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9078/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - blb-backend
      - blb-media
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ── Stash Media Server ─────────────────────────────────────────────
  stash:
    image: stashapp/stash:latest
    container_name: blb-stash
    restart: unless-stopped
    ports:
      - "${STASH_PORT:-9999}:9999"
    volumes:
      - stash-config:/root/.stash
      - ${STASH_GENERATED_PATH:-./storage/stash/generated}:/generated
      - ${STASH_METADATA_PATH:-./storage/stash/metadata}:/metadata
      - ${STASH_CACHE_PATH:-./storage/stash/cache}:/cache
      - ${STASH_BLOBS_PATH:-./storage/stash/blobs}:/blobs
    environment:
      STASH_STASH: "/generated"
      STASH_METADATA: "/metadata"
      STASH_CACHE: "/cache"
      STASH_BLOBS: "/blobs"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9999/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - blb-media
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  # ── Nginx Reverse Proxy with SSL ───────────────────────────────────
  nginx-proxy:
    image: nginx:alpine
    container_name: blb-nginx-proxy
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx/proxy.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/sites:/etc/nginx/sites-available:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - ./docker/nginx/logs:/var/log/nginx
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - blb-frontend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

# ── Networks ──────────────────────────────────────────────────────────
networks:
  blb-frontend:
    driver: bridge
    name: blb-frontend
  blb-backend:
    driver: bridge
    name: blb-backend
  blb-media:
    driver: bridge
    name: blb-media

# ── Persistent Volumes ────────────────────────────────────────────────
volumes:
  postgres-data:
    name: blb-postgres-data
  redis-data:
    name: blb-redis-data
  app-storage:
    name: blb-app-storage
  app-bootstrap-cache:
    name: blb-app-bootstrap-cache
  uniscrape-scrapers:
    name: blb-uniscrape-scrapers
  multi-scrobbler-data:
    name: blb-multi-scrobbler-data
  stash-config:
    name: blb-stash-config
