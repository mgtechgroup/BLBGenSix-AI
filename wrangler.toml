# Cloudflare Pages - BLBGenSix AI Static Frontend
# This config deploys the static landing page + Vue/React frontend to Cloudflare Pages
# The Laravel API backend should be deployed to a separate server (Railway, Render, VPS)

build:
  command: npm install && npm run build
  output: public
  environment:
    NODE_VERSION: 20

# For full-stack deployment (Laravel + frontend), use a VPS or Railway instead
# Cloudflare Pages is best for the static frontend only
