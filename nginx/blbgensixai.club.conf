server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name blbgensixai.club www.blbgensixai.club;
    root /var/www/blbgensixai.club/public;
    index index.html index.php;

    # SSL
    ssl_certificate /etc/letsencrypt/live/blbgensixai.club/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blbgensixai.club/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    server_tokens off;

    client_max_body_size 100M;

    # Stash (adult media manager)
    location /stash/ {
        proxy_pass http://127.0.0.1:9999/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # UniScrape API
    location /api/ {
        proxy_pass http://127.0.0.1:9876/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /stremio/ { proxy_pass http://127.0.0.1:9876/stremio/; }
    location /plex/ { proxy_pass http://127.0.0.1:9876/plex/; }
    location /jellyfin/ { proxy_pass http://127.0.0.1:9876/jellyfin/; }
    location /stashapi/ { proxy_pass http://127.0.0.1:9876/stash/; }
    location /torrent/ { proxy_pass http://127.0.0.1:9876/torrent/; }
    location /search/ { proxy_pass http://127.0.0.1:9876/search/; }

    # Static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\. { deny all; }
    location ~ ^/(storage|vendor|node_modules) { deny all; }
}

server {
    listen 80;
    server_name blbgensixai.club www.blbgensixai.club;
    return 301 https://blbgensixai.club$request_uri;
}
