server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name blbgensixai.club www.blbgensixai.club;
    root /var/www/blbgensixai.club/public;
    index index.php;

    # SSL - Let's Encrypt
    ssl_certificate /etc/letsencrypt/live/blbgensixai.club/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blbgensixai.club/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/blbgensixai.club/chain.pem;

    # SSL Hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # Remove server header
    server_tokens off;
    more_clear_headers 'Server';

    # Max upload size
    client_max_body_size 100M;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    # Force www -> non-www
    if ($host = 'www.blbgensixai.club') {
        return 301 https://blbgensixai.club$request_uri;
    }

    # Force HTTPS
    if ($scheme = http) {
        return 301 https://$host$request_uri;
    }

    # Laravel
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # API rate limiting
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Login rate limiting (stricter)
    location /api/v1/auth/login {
        limit_req zone=login burst=3 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_hide_header Server;
    }

    # Block sensitive files
    location ~ /\.(env|git|htaccess|htpasswd) {
        deny all;
    }

    location ~ /\.well-known {
        allow all;
    }

    # Deny access to sensitive directories
    location ~ ^/(storage|vendor|node_modules|bootstrap/cache) {
        deny all;
    }

    # Static assets with caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Block common attack vectors
    location ~* (eval\(|base64_decode|union.*select|insert.*into|drop.*table) {
        return 403;
    }
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name blbgensixai.club www.blbgensixai.club;
    return 301 https://blbgensixai.club$request_uri;
}
