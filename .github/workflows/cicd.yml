name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, iconv, intl, bcmath, sodium
      
      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
      
      - name: Install Dependencies
        run: composer install --no-interaction --no-scripts
      
      - name: Run Security Audit
        run: |
          composer audit --no-interaction || true
          echo "Checking for hardcoded secrets..."
          grep -r "password\|secret\|api_key\|token" --include="*.php" --include="*.env" --include="*.js" --include="*.vue" --exclude-dir=vendor --exclude-dir=node_modules | grep -v "config/" | grep -v ".env.example" | grep -v "test" | grep -v "placeholder" | grep -v "your_" || echo "No hardcoded secrets found"
      
      - name: Run PHP Lint
        run: find . -name "*.php" -not -path "./vendor/*" -exec php -l {} \; 2>&1 | grep -v "No syntax errors" || true

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install Dependencies
        run: npm ci
      
      - name: Build Vue
        run: npm run build:vue || echo "Vue build skipped (no assets)"
      
      - name: Build React
        run: npm run build:react || echo "React build skipped (no assets)"
      
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: public/build/
          retention-days: 7

  deploy:
    needs: [security-audit, build-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: blbgensixai
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
